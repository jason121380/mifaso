apiVersion: zeabur.com/v1
kind: ZeaburSpec
metadata:
  name: luxe-magazine
spec:
  services:
    - name: luxe-magazine
      template: NODEJS
      spec:
        source:
          type: GITHUB
        ports:
          - id: web
            port: 3000
            type: HTTP
        env:
          - key: DATABASE_URL
            ref:
              service: postgresql
              variable: POSTGRESQL_URI
          - key: AUTH_SECRET
            value: ${AUTH_SECRET}
          - key: NEXTAUTH_URL
            value: ${ZEABUR_WEB_URL}
          - key: SITE_URL
            value: ${ZEABUR_WEB_URL}
          - key: NODE_ENV
            value: production
          - key: OPENAI_API_KEY
            value: ${OPENAI_API_KEY}
        volumes:
          - id: uploads
            dir: /app/public/uploads
        commands:
          build:
            - npm install
            - npx prisma generate
            - npx prisma migrate deploy
            - npm run build
          start:
            - npm start

    - name: postgresql
      template: POSTGRESQL
